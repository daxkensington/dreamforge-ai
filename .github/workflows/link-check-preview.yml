name: Link Check (PR Preview)

# Runs when Vercel finishes deploying a PR preview, then checks every link
# and asset against the preview URL. Fails the PR check if anything 404s,
# so broken links never make it to main.

on:
  deployment_status:

jobs:
  check-preview:
    # Only run for successful Vercel preview deploys (skip prod, skip failures).
    if: |
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment != 'production' &&
      github.event.deployment_status.target_url != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check links + assets against preview
        env:
          BASE_URL: ${{ github.event.deployment_status.target_url }}
        run: |
          echo "🔍 Preview URL: $BASE_URL"
          node scripts/check-links.mjs

      - name: Comment results on PR
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.deployment.sha;
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
            });
            for (const pr of prs.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: [
                  `❌ **Link check failed on preview deploy**`,
                  ``,
                  `Preview: ${context.payload.deployment_status.target_url}`,
                  `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                  ``,
                  `One or more internal links or asset references are broken. Check the workflow log for details.`,
                ].join("\n"),
              });
            }
