name: Build & publish RunPod worker image

on:
  push:
    branches: [main]
    paths:
      - "runpod-worker/**"
      - ".github/workflows/runpod-worker-build.yml"
  # Allow manual re-run from the Actions tab.
  workflow_dispatch: {}

concurrency:
  group: runpod-worker-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./runpod-worker
          file: ./runpod-worker/Dockerfile
          push: true
          tags: |
            ghcr.io/daxkensington/dreamforge-worker:latest
            ghcr.io/daxkensington/dreamforge-worker:${{ github.sha }}
          # Build caching keeps rebuild time down on small changes.
          cache-from: type=registry,ref=ghcr.io/daxkensington/dreamforge-worker:buildcache
          cache-to: type=registry,ref=ghcr.io/daxkensington/dreamforge-worker:buildcache,mode=max
          # The image has CUDA bits so linux/amd64 only — RunPod runs on x86 GPUs.
          platforms: linux/amd64

      - name: Summary
        run: |
          echo "### RunPod worker image published" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/daxkensington/dreamforge-worker:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/daxkensington/dreamforge-worker:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next step:** rolling-restart the RunPod endpoint so live workers pull the new \`:latest\` tag. Or update the endpoint config to pin the SHA-tagged image." >> $GITHUB_STEP_SUMMARY
